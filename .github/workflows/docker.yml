name: Docker

# Build (and on push: publish) the kronk container image variants defined in
# zarf/docker/kronk/Dockerfile. Five variants are produced:
#
#   cpu      — minimal, runs on any host (all arches)
#   cuda     — NVIDIA CUDA runtime baked in
#   vulkan   — vendor-neutral GPU via Vulkan
#   rocm     — AMD ROCm runtime (linux/amd64 only — upstream has no arm64 build)
#   all      — bundles cpu+cuda+vulkan+rocm into a single image
#
# Every variant also bakes in matching whisper.cpp (bucky) shared libraries
# for audio transcription via /v1/audio/transcriptions. The bucky processor
# list is decoupled from the llama list because upstream whisper.cpp has no
# rocm build — the rocm variant ships the vulkan bucky bundle and the
# container entrypoint redirects KRONK_BUCKY_LIB_PATH at it on ROCm hosts.
# See the BUCKY_PROCESSORS map in the plan job below.
#
# Multi-arch images (cpu / cuda / vulkan / all) are built natively on
# `ubuntu-24.04` (amd64) and `ubuntu-24.04-arm` (arm64) runners, then
# stitched into a single manifest with `docker buildx imagetools create`.
# This avoids the ~5x slowdown of QEMU emulation for arm64 builds. The
# single-arch `rocm` variant still goes through `merge`; `imagetools
# create` happily wraps a single platform manifest under the same tag
# scheme so consumers can pull `rocm` by tag without caring about arch.
#
# ┌────────────────────┬─────────────────────────────────────────────────────┐
# │ Event              │ Behaviour                                           │
# ├────────────────────┼─────────────────────────────────────────────────────┤
# │ pull_request       │ Build the `cpu` variant for linux/amd64 only (no    │
# │                    │ push) by default. Add a label `build all` to build  │
# │                    │ every variant on every supported arch, or           │
# │                    │ `build <variant>` (e.g. `build cuda`) for a subset  │
# │                    │ (each added variant builds on all its arches, and   │
# │                    │ promotes cpu back to its full arch list too).       │
# ├────────────────────┼─────────────────────────────────────────────────────┤
# │ push → main        │ Build all variants, smoke-test cpu/amd64, then      │
# │                    │ push & cosign-sign to the trunk-snapshot repos      │
# │                    │ on BOTH registries:                                 │
# │                    │   {ghcr.io/ardanlabs,ardanlabs}/kronk-main          │
# │                    │     :main-<sha>-<v>  +  :main-latest-<v>            │
# │                    │ Also refreshes the registry-backed BuildKit cache   │
# │                    │ so PR builds stay warm.                             │
# ├────────────────────┼─────────────────────────────────────────────────────┤
# │ push → tag v*      │ Build & push all variants as                        │
# │                    │   <registry>/ardanlabs/kronk:<tag>-<v>              │
# │                    │   <registry>/ardanlabs/kronk:latest-<v>             │
# │                    │ Plus a floating <registry>/ardanlabs/kronk:latest   │
# │                    │ pointing at the cpu image.                          │
# ├────────────────────┼─────────────────────────────────────────────────────┤
# │ workflow_dispatch  │ Manual run. `variants` input ("all" or comma list)  │
# │                    │ picks the subset to build (no push).                │
# └────────────────────┴─────────────────────────────────────────────────────┘
#
# The kronk binary embedded in the image has its version string stamped at
# link time via `-ldflags "-X .../sdk/kronk.Version=<value>"` — see
# zarf/docker/kronk/Dockerfile and sdk/kronk/kronk.go.

on:
  pull_request:
    branches: [main]
    # `labeled`/`unlabeled` lets reviewers expand the PR build matrix by
    # adding a `build <variant>` label after the PR is open, without
    # needing to push an empty commit.
    #
    # A `paths:` filter is intentionally NOT set here: GitHub evaluates
    # `paths:` as a changeset filter, and `labeled`/`unlabeled` events
    # carry no changeset — so combining them silently drops every label
    # event before a run is even created. We replicate the path-relevance
    # check inside the `plan` job below (it's cheap, and the `build` job
    # already short-circuits on an empty matrix).
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      variants:
        description: "Comma-separated variants to build, or 'all'."
        default: "all"
        required: false

# Cancel superseded runs on the same PR / branch. Tag pushes get a unique
# group so simultaneously-pushed tags don't cancel each other. Keyed on
# the PR number when available so two same-named branches from different
# forks don't fight for the same slot.
concurrency:
  group: docker-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  GHCR_IMAGE: ghcr.io/ardanlabs/kronk
  # Separate repos for main-branch builds, one per registry. Kept apart
  # from the release repos (GHCR_IMAGE / DH_IMAGE) so trunk snapshots
  # never mix into the release tag list, and so a floating `main-latest`
  # can move freely without touching `latest`. Main builds publish to
  # BOTH registries, same as releases.
  GHCR_MAIN_IMAGE: ghcr.io/ardanlabs/kronk-main
  DH_MAIN_IMAGE: ardanlabs/kronk-main
  DH_IMAGE: ardanlabs/kronk
  # Registry-backed BuildKit cache. Stored as OCI artifacts alongside
  # the runtime images in GHCR — no 10 GB per-repo GHA quota to fight,
  # and the cache survives independently of the (90-day-by-default)
  # `actions/cache` entries. One tag per (variant, arch) scope.
  BUILDCACHE_IMAGE: ghcr.io/ardanlabs/kronk-buildcache

jobs:
  # ---------------------------------------------------------------------------
  # plan
  #
  # Decides which (variant, arch) pairs to build for this event and emits a
  # JSON matrix consumed by the `build` job. Also produces the version
  # string that gets stamped into the binary and used as the image tag
  # prefix.
  # ---------------------------------------------------------------------------
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # `pull-requests: read` is needed by `gh api /repos/.../pulls/N/files`
    # in the relevance gate below. Everything else stays at the default.
    permissions:
      contents: read
      pull-requests: read
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      push: ${{ steps.plan.outputs.push }}
      is_tag: ${{ steps.plan.outputs.is_tag }}
      is_main: ${{ steps.plan.outputs.is_main }}
      version: ${{ steps.plan.outputs.version }}
      variants: ${{ steps.plan.outputs.variants }}
    steps:
      # Needed for the tag-vs-constant guard below. Sparse to keep the
      # planner cheap — only the script and the one file it inspects.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          sparse-checkout: |
            .github/scripts
            sdk/kronk/kronk.go
          sparse-checkout-cone-mode: false

      # Guard: when a `v*` tag triggered this run, the tag must match
      # `const Version` in sdk/kronk/kronk.go. Fails the workflow before
      # any image is built. See .github/scripts/check-version.sh.
      - name: Check tag matches sdk/kronk.Version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: ./.github/scripts/check-version.sh

      - name: Compute matrix
        id: plan
        env:
          EVENT: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_LABEL_NAME: ${{ github.event.label.name }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          PR_ACTOR: ${{ github.event.sender.login }}
          DISPATCH_VARIANTS: ${{ github.event.inputs.variants }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # -------------------------------------------------------------------
          # Version + push policy
          #
          # Two events publish images, each to its own pair of repos
          # (GHCR + Docker Hub):
          #
          #   * tag push (v*) → release repos (GHCR_IMAGE + DH_IMAGE),
          #     cosign-signed. IS_TAG=true.
          #   * push → main  → trunk-snapshot repos (GHCR_MAIN_IMAGE +
          #     DH_MAIN_IMAGE), cosign-signed, tagged main-<sha> +
          #     main-latest. IS_MAIN=true.
          #
          # Both refresh the registry-backed BuildKit cache. PRs and
          # workflow_dispatch build only (PUSH=false) and never publish.
          # -------------------------------------------------------------------
          IS_TAG=false
          IS_MAIN=false
          if [[ "$EVENT" == "push" && "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/}"     # e.g. v1.26.4
            PUSH=true
            IS_TAG=true
          elif [[ "$EVENT" == "push" && "$REF" == "refs/heads/main" ]]; then
            VERSION="main-${SHA:0:7}"       # e.g. main-abc1234 (stamped
                                            # into the binary AND used as
                                            # the image tag prefix)
            PUSH=true
            IS_MAIN=true
          else
            # pull_request or workflow_dispatch — build only, no push.
            VERSION="pr-${SHA:0:7}"
            PUSH=false
          fi

          # -------------------------------------------------------------------
          # Variant catalogue. Keep in sync with the table in the header
          # comment above and with zarf/docker/kronk/Dockerfile.
          # -------------------------------------------------------------------
          ALL_VARIANTS=(cpu cuda vulkan rocm all)

          declare -A PLATFORMS=(
            [cpu]="amd64 arm64"
            [cuda]="amd64 arm64"
            [vulkan]="amd64 arm64"
            [rocm]="amd64"
            [all]="amd64 arm64"
          )
          declare -A TARGET=(
            [cpu]=runtime
            [cuda]=runtime
            [vulkan]=runtime
            [rocm]=runtime
            [all]=runtime
          )
          # Whitespace-separated processor lists fed to LLAMA_PROCESSORS in
          # the Dockerfile.
          declare -A PROCESSORS=(
            [cpu]="cpu"
            [cuda]="cuda"
            [vulkan]="vulkan"
            [rocm]="rocm"
            [all]="cpu cuda vulkan rocm"
          )
          # Whitespace-separated processor lists fed to BUCKY_PROCESSORS
          # in the Dockerfile. The upstream whisper.cpp build matrix has
          # NO rocm bundle (see sdk/tools/bucky/libs/combinations.go), so
          # the rocm variant gets the vulkan bucky bundle instead — the
          # container entrypoint (zarf/docker/kronk/entrypoint.sh) points
          # KRONK_BUCKY_LIB_PATH at it on ROCm hosts so transcription
          # stays GPU-accelerated via RADV.
          declare -A BUCKY_PROCESSORS=(
            [cpu]="cpu"
            [cuda]="cuda"
            [vulkan]="vulkan"
            [rocm]="vulkan"
            [all]="cpu cuda vulkan"
          )

          # -------------------------------------------------------------------
          # PR relevance gate
          #
          # Replicates what the trigger-level `paths:` filter used to do
          # before we removed it (see header comment in `on:`). Two ways
          # for a `pull_request` event to be irrelevant:
          #
          #   1. `labeled`/`unlabeled` of a label that isn't `build *` —
          #      Docker builds only respond to the build-selection labels.
          #   2. The PR's changeset doesn't touch any code path the image
          #      depends on (Go sources, the Dockerfile, the kms zarf, or
          #      this workflow file).
          #
          # When irrelevant, leave CHOSEN empty so an `{"include":[]}`
          # matrix is emitted and the `build` job's `if:` short-circuits.
          # -------------------------------------------------------------------
          PR_RELEVANT=true
          if [[ "$EVENT" == "pull_request" ]]; then
            if [[ "$ACTION" =~ ^(labeled|unlabeled)$ && "$PR_LABEL_NAME" != build\ * ]]; then
              echo "Skipping: non-build label event ($ACTION: $PR_LABEL_NAME)"
              PR_RELEVANT=false
            else
              PR_FILES="$(gh api --paginate \
                "/repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files" \
                --jq '.[].filename')"
              if ! grep -Eq '(\.go$|^go\.(mod|sum)$|^\.go-version$|^\.dockerignore$|^cmd/server/api/frontends/bui/|^zarf/docker/kronk/|^zarf/kms/|^\.github/workflows/docker\.yml$)' <<<"$PR_FILES"; then
                echo "Skipping: PR diff touches no Docker-relevant paths"
                PR_RELEVANT=false
              fi
            fi
          fi

          # -------------------------------------------------------------------
          # Build-label permission gate
          #
          # `build *` labels expand the matrix to expensive multi-arch
          # variants, so they're restricted to users with `write`,
          # `maintain`, or `admin` permission on the repo. The
          # label-guard.yml workflow handles the user-visible cleanup
          # (removes the label, posts a comment), but its cleanup
          # actions use GITHUB_TOKEN, which does NOT trigger downstream
          # workflow runs — so we can't rely on it to cancel an
          # in-flight build via an `unlabeled` event. Instead, replicate
          # the check here and strip the unauthorized label from
          # PR_LABELS so the matrix never sees it.
          #
          # Only the `labeled` action needs to be gated: every other
          # `build *` label on the PR was already vetted when it was
          # applied (each label application fires its own `labeled`
          # event, including labels applied at PR-creation time).
          # -------------------------------------------------------------------
          if [[ "$EVENT" == "pull_request" \
             && "$ACTION" == "labeled" \
             && "$PR_LABEL_NAME" == build\ * \
             && "$PR_ACTOR" != "github-actions[bot]" ]]; then
            ENCODED_ACTOR="$(jq -rn --arg s "$PR_ACTOR" '$s|@uri')"
            PERMISSION="$(gh api \
              "/repos/$GITHUB_REPOSITORY/collaborators/$ENCODED_ACTOR/permission" \
              --jq '.permission' 2>/dev/null || echo none)"
            PERMISSION="${PERMISSION:-none}"
            case "$PERMISSION" in
              admin|maintain|write)
                echo "Authorized build label '$PR_LABEL_NAME' from $PR_ACTOR (permission=$PERMISSION)"
                ;;
              *)
                echo "::warning::Ignoring unauthorized build label '$PR_LABEL_NAME' from '$PR_ACTOR' (permission=$PERMISSION)"
                PR_LABELS="$(jq -c --arg n "$PR_LABEL_NAME" \
                  'map(select(. != $n))' <<<"$PR_LABELS")"
                ;;
            esac
          fi

          # -------------------------------------------------------------------
          # Variant selection
          # -------------------------------------------------------------------
          CHOSEN=()
          case "$EVENT" in
            push)
              CHOSEN=("${ALL_VARIANTS[@]}")
              ;;
            workflow_dispatch)
              if [[ -z "$DISPATCH_VARIANTS" || "$DISPATCH_VARIANTS" == "all" ]]; then
                CHOSEN=("${ALL_VARIANTS[@]}")
              else
                IFS=',' read -ra REQ <<< "$DISPATCH_VARIANTS"
                for v in "${REQ[@]}"; do
                  v="$(echo "$v" | xargs)" # trim
                  if [[ -n "${PLATFORMS[$v]:-}" ]]; then
                    CHOSEN+=("$v")
                  else
                    echo "::warning::Unknown variant '$v' — ignoring"
                  fi
                done
              fi
              ;;
            pull_request)
              if [[ "$PR_RELEVANT" != "true" ]]; then
                : # empty matrix; build job is skipped
              else
                # cpu is always built — it exercises the most-shared
                # Dockerfile path (default runtime stage, no GPU apt
                # conditionals) so a regression there is most likely to
                # be caught by a single, cheap matrix entry. Label
                # `build all` expands to every variant; otherwise each
                # `build <variant>` label adds that variant on top of
                # cpu.
                #
                # The default PR build is further trimmed to linux/amd64
                # only (see PR_DEFAULT_ONLY below) — arm64 coverage on
                # cpu is provided by the post-merge push-to-main run,
                # which still builds every (variant, arch) pair. A PR
                # that wants the full matrix can opt in with `build all`.
                CHOSEN=(cpu)
                PR_DEFAULT_ONLY=true
                if echo "$PR_LABELS" | jq -e 'any(. == "build all")' >/dev/null; then
                  CHOSEN=("${ALL_VARIANTS[@]}")
                  PR_DEFAULT_ONLY=false
                else
                  for v in "${ALL_VARIANTS[@]}"; do
                    [[ "$v" == "cpu" ]] && continue
                    if echo "$PR_LABELS" | jq -e --arg n "build $v" 'any(. == $n)' >/dev/null; then
                      CHOSEN+=("$v")
                      PR_DEFAULT_ONLY=false
                    fi
                  done
                fi
              fi
              ;;
          esac

          # -------------------------------------------------------------------
          # Expand (variant) → (variant, arch) matrix entries
          #
          # PR_DEFAULT_ONLY (set in the pull_request branch above) trims
          # the implicit cpu-only PR build down to linux/amd64. Any PR
          # that opts into a wider matrix (via `build all` or a
          # `build <variant>` label) clears the flag and gets the full
          # per-variant platform list.
          # -------------------------------------------------------------------
          INCLUDE='[]'
          for v in "${CHOSEN[@]}"; do
            PLATS="${PLATFORMS[$v]}"
            if [[ "${PR_DEFAULT_ONLY:-false}" == "true" && "$v" == "cpu" ]]; then
              PLATS="amd64"
            fi
            for a in $PLATS; do
              RUNNER=$([[ "$a" == "arm64" ]] && echo "ubuntu-24.04-arm" || echo "ubuntu-24.04")
              ITEM=$(jq -nc \
                --arg variant "$v" \
                --arg arch "$a" \
                --arg platform "linux/$a" \
                --arg target "${TARGET[$v]}" \
                --arg processors "${PROCESSORS[$v]}" \
                --arg bucky_processors "${BUCKY_PROCESSORS[$v]}" \
                --arg runner "$RUNNER" \
                '{variant:$variant, arch:$arch, platform:$platform, target:$target, processors:$processors, bucky_processors:$bucky_processors, runner:$runner}')
              INCLUDE=$(echo "$INCLUDE" | jq -c --argjson i "$ITEM" '. + [$i]')
            done
          done
          MATRIX=$(jq -nc --argjson inc "$INCLUDE" '{include:$inc}')
          VARIANTS_JSON=$(printf '%s\n' "${CHOSEN[@]}" | jq -Rsc 'split("\n") | map(select(length > 0))')

          {
            echo "matrix=$MATRIX"
            echo "push=$PUSH"
            echo "is_tag=$IS_TAG"
            echo "is_main=$IS_MAIN"
            echo "version=$VERSION"
            echo "variants=$VARIANTS_JSON"
          } >> "$GITHUB_OUTPUT"

          echo "::group::Plan"
          echo "event=$EVENT  ref=$REF  push=$PUSH  is_tag=$IS_TAG  is_main=$IS_MAIN  version=$VERSION"
          echo "chosen variants: ${CHOSEN[*]}"
          echo "$MATRIX" | jq .
          echo "::endgroup::"

  # ---------------------------------------------------------------------------
  # build
  #
  # One job per (variant, arch). On push events the per-arch image is
  # pushed by digest only — no human-readable tag yet. The `merge` job
  # combines arch-specific digests into the final multi-arch manifest.
  # On PR / workflow_dispatch events we just build (no push) to validate
  # the Dockerfile.
  # ---------------------------------------------------------------------------
  build:
    needs: plan
    if: needs.plan.outputs.matrix != '{"include":[]}'
    runs-on: ${{ matrix.runner }}
    # The `all` variant (cpu+cuda+vulkan+rocm) is the long pole; 90 min
    # leaves headroom over a cold-cache build while still killing a hung
    # runner well before the 6-hour GitHub default.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        # `docker/build-push-action` on the all-backends image easily
        # consumes >30 GB across BuildKit cache + layers. The hosted
        # runners ship with ~14 GB free out of the box; reclaiming the
        # preinstalled toolchains buys another ~25 GB.
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          df -h /

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      # Always log in to GHCR — even on the PR / workflow_dispatch path,
      # so the registry-backed BuildKit cache (BUILDCACHE_IMAGE) can be
      # pulled. The default `GITHUB_TOKEN` for PRs from the same repo
      # has package:read; PRs from forks will silently miss the cache
      # and rebuild from scratch (still correct, just slower).
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Both publish paths (tag → release repos, main → snapshot repos)
      # push to Docker Hub. PR / workflow_dispatch never publish, so
      # skip the DH login there to avoid a needless credential use.
      - name: Log in to Docker Hub
        if: needs.plan.outputs.is_tag == 'true' || needs.plan.outputs.is_main == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Non-push validation build. Runs on every path that needs the
      # smoke-test / Trivy gate BEFORE anything is published:
      #   - PR / workflow_dispatch: every matrix entry (Dockerfile
      #     compile check for this arch).
      #   - push → main: ONLY the cpu/amd64 entry, purely to produce
      #     the loaded `kronk-smoke:latest` image the gate needs. Every
      #     other main entry is built directly by the push step below;
      #     the cache makes cpu/amd64's second build there nearly free.
      # Tag pushes skip this entirely — they build the same layers from
      # cache in the push step, and the gate already ran on main.
      #
      # The cpu/amd64 build additionally loads the resulting image
      # into the local Docker daemon so the smoke-test step below can
      # `docker run` it. Loading is restricted to a single (variant,
      # arch) pair so we don't pay the cost on every matrix entry —
      # cpu is the most-shared Dockerfile path and amd64 is the only
      # arch whose local daemon matches the runner's host arch.
      #
      # This step never WRITES the registry-backed BuildKit cache: on
      # publish paths (main / tag) the push steps below own the
      # cache-to; on PR / workflow_dispatch we read only so a PR can't
      # overwrite the trunk-seeded layers.
      - name: Build (no push)
        if: >-
          needs.plan.outputs.push != 'true'
          || (needs.plan.outputs.is_main == 'true'
              && matrix.variant == 'cpu'
              && matrix.arch == 'amd64')
        id: build_nopush
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          file: zarf/docker/kronk/Dockerfile
          platforms: ${{ matrix.platform }}
          target: ${{ matrix.target }}
          push: false
          load: ${{ matrix.variant == 'cpu' && matrix.arch == 'amd64' }}
          tags: ${{ matrix.variant == 'cpu' && matrix.arch == 'amd64' && 'kronk-smoke:latest' || '' }}
          build-args: |
            LLAMA_PROCESSORS=${{ matrix.processors }}
            BUCKY_PROCESSORS=${{ matrix.bucky_processors }}
            KRONK_VERSION=${{ needs.plan.outputs.version }}-${{ matrix.variant }}
          cache-from: type=registry,ref=${{ env.BUILDCACHE_IMAGE }}:${{ matrix.variant }}-${{ matrix.arch }}

      # Smoke test: prove the cpu/amd64 image actually starts and the
      # entrypoint resolves the kronk binary. Catches breakage like a
      # missing shared library or a bad ENTRYPOINT path that the build
      # alone would not detect. Runs only on the (cpu, amd64, no-push)
      # path — see `load:` above.
      #
      # Coverage gap (intentional): only cpu/amd64 is exercised at
      # runtime. arm64 can't run natively on this amd64 runner without
      # QEMU emulation (the whole point of the native-arch matrix is to
      # avoid QEMU), and the cuda/vulkan/rocm variants need GPU hardware
      # the hosted runners don't have. cpu is the most-shared Dockerfile
      # path, so a single (cpu, amd64) smoke test catches the breakage
      # most likely to be common across variants. arm64 image validity
      # is still covered structurally by the build succeeding.
      - name: Smoke test cpu/amd64 image
        if: >-
          needs.plan.outputs.is_tag != 'true'
          && matrix.variant == 'cpu'
          && matrix.arch == 'amd64'
        run: |
          docker run --rm --entrypoint kronk kronk-smoke:latest --version
          docker run --rm --entrypoint kronk kronk-smoke:latest --help

      # Vulnerability scan the runtime image before it can ship. Runs on
      # the same (cpu, amd64, no-push) path as the smoke test — the only
      # path where the image is `load`ed into the local daemon. This
      # gates PR and push→main builds; since a tag push builds the same
      # layers from the same cache, a CVE introduced by a base-image or
      # dependency bump is caught on main before a release tag is cut.
      #
      # Fails only on fixable CRITICAL findings to keep the gate
      # actionable — unfixed CVEs (no upstream patch yet) would block
      # every build with no remediation available, so they're ignored.
      - name: Scan cpu/amd64 image for vulnerabilities (Trivy)
        if: >-
          needs.plan.outputs.is_tag != 'true'
          && matrix.variant == 'cpu'
          && matrix.arch == 'amd64'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: kronk-smoke:latest
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true
          vuln-type: os,library

      # Tag-push path (refs/tags/v*): build & push by digest only.
      # Final tags get applied by the `merge` job once both arches
      # are available. Main pushes never reach this step — see the
      # plan job and the "Build (no push)" step above.
      #
      # GHCR and Docker Hub are pushed in SEPARATE buildx invocations
      # on purpose. A single invocation with two `outputs:` lines pushes
      # different index-manifest digests to each registry (each
      # provenance attestation embeds the destination registry name),
      # but `steps.build.outputs.digest` only surfaces one of them —
      # so the `merge` job's cross-registry refs become unresolvable
      # ("manifest unknown" against one of the two registries).
      #
      # Splitting the pushes:
      #   * gives each step its own `outputs.digest` (one per registry,
      #     no ambiguity to track in the merge job);
      #   * preserves provenance attestations on both registries,
      #     each correctly naming its own canonical reference;
      #   * costs almost nothing — the second buildx call hits the
      #     registry-backed BuildKit cache populated by the first and
      #     only re-pushes layers to the second registry.
      #
      # `image-manifest=true` on the cache export writes it as an OCI
      # image manifest (rather than the default OCI image index) so
      # GHCR's UI renders the buildcache tags as proper packages
      # instead of unknown artifacts. Only the GHCR step writes the
      # cache; the DH step reads from it.
      - name: Build & push by digest to GHCR
        if: needs.plan.outputs.is_tag == 'true'
        id: build_ghcr
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          file: zarf/docker/kronk/Dockerfile
          platforms: ${{ matrix.platform }}
          target: ${{ matrix.target }}
          build-args: |
            LLAMA_PROCESSORS=${{ matrix.processors }}
            BUCKY_PROCESSORS=${{ matrix.bucky_processors }}
            KRONK_VERSION=${{ needs.plan.outputs.version }}-${{ matrix.variant }}
          outputs: type=image,name=${{ env.GHCR_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          # Supply-chain attestations: max-mode SLSA provenance plus an
          # SPDX SBOM, attached to each per-arch image so consumers can
          # `cosign verify-attestation` / pull the SBOM alongside the
          # cosign signatures produced in the merge job.
          #
          # CAVEAT — validate on a throwaway tag before trusting: with
          # push-by-digest, buildx attaches the attestations as extra
          # manifests referenced from a per-arch image index. The merge
          # job assembles the final manifest list from the image digests
          # collected in Export digests; confirm those attestation
          # manifests survive `imagetools create` (inspect the published
          # tag for provenance/SBOM). If they're dropped by the merge,
          # switch to attaching the SBOM via cosign attest in the merge
          # job instead.
          provenance: mode=max
          sbom: true
          cache-from: type=registry,ref=${{ env.BUILDCACHE_IMAGE }}:${{ matrix.variant }}-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.BUILDCACHE_IMAGE }}:${{ matrix.variant }}-${{ matrix.arch }},mode=max,image-manifest=true,compression=zstd

      - name: Build & push by digest to Docker Hub
        if: needs.plan.outputs.is_tag == 'true'
        id: build_dh
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          file: zarf/docker/kronk/Dockerfile
          platforms: ${{ matrix.platform }}
          target: ${{ matrix.target }}
          build-args: |
            LLAMA_PROCESSORS=${{ matrix.processors }}
            BUCKY_PROCESSORS=${{ matrix.bucky_processors }}
            KRONK_VERSION=${{ needs.plan.outputs.version }}-${{ matrix.variant }}
          outputs: type=image,name=${{ env.DH_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          # Same provenance + SBOM attestations as the GHCR push above so
          # both registries carry equivalent supply-chain metadata. See
          # the CAVEAT there re: validating attestation survival through
          # the imagetools merge.
          provenance: mode=max
          sbom: true
          # cache-from only: the GHCR step above already populated the
          # cache for this (variant, arch); a second cache-to would
          # just rewrite the same content.
          cache-from: type=registry,ref=${{ env.BUILDCACHE_IMAGE }}:${{ matrix.variant }}-${{ matrix.arch }}

      # Main-push path (refs/heads/main): build & push by digest to the
      # trunk-snapshot repos GHCR_MAIN_IMAGE + DH_MAIN_IMAGE, mirroring
      # the release GHCR/DH split above (separate buildx invocations so
      # each surfaces its own outputs.digest — see the long note there).
      # The merge_main job applies the main-<sha> / main-latest tags once
      # both arches are available. Tag pushes never reach these steps;
      # main pushes never reach the release GHCR/DH steps above.
      #
      # The GHCR step is also the cache WRITE for main builds (mode=max),
      # keeping PR builds warm — the old main "Build (no push)" cache-to
      # moved here. The DH step reads from that cache (cache-from only),
      # exactly like the release DH step. Same provenance + SBOM
      # attestations as the release path.
      - name: Build & push by digest to GHCR (main)
        if: needs.plan.outputs.is_main == 'true'
        id: build_ghcr_main
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          file: zarf/docker/kronk/Dockerfile
          platforms: ${{ matrix.platform }}
          target: ${{ matrix.target }}
          build-args: |
            LLAMA_PROCESSORS=${{ matrix.processors }}
            BUCKY_PROCESSORS=${{ matrix.bucky_processors }}
            KRONK_VERSION=${{ needs.plan.outputs.version }}-${{ matrix.variant }}
          outputs: type=image,name=${{ env.GHCR_MAIN_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          provenance: mode=max
          sbom: true
          cache-from: type=registry,ref=${{ env.BUILDCACHE_IMAGE }}:${{ matrix.variant }}-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.BUILDCACHE_IMAGE }}:${{ matrix.variant }}-${{ matrix.arch }},mode=max,image-manifest=true,compression=zstd

      - name: Build & push by digest to Docker Hub (main)
        if: needs.plan.outputs.is_main == 'true'
        id: build_dh_main
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          file: zarf/docker/kronk/Dockerfile
          platforms: ${{ matrix.platform }}
          target: ${{ matrix.target }}
          build-args: |
            LLAMA_PROCESSORS=${{ matrix.processors }}
            BUCKY_PROCESSORS=${{ matrix.bucky_processors }}
            KRONK_VERSION=${{ needs.plan.outputs.version }}-${{ matrix.variant }}
          outputs: type=image,name=${{ env.DH_MAIN_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          provenance: mode=max
          sbom: true
          # cache-from only: the GHCR (main) step above already populated
          # the cache for this (variant, arch).
          cache-from: type=registry,ref=${{ env.BUILDCACHE_IMAGE }}:${{ matrix.variant }}-${{ matrix.arch }}

      # Release-path digest export (tag push): GHCR + Docker Hub.
      - name: Export digests
        if: needs.plan.outputs.is_tag == 'true'
        run: |
          # One file per registry, named with the bare hex of the digest
          # so the merge job can reconstruct `<image>@sha256:<digest>`
          # references unambiguously.
          mkdir -p /tmp/digests/ghcr /tmp/digests/dh
          d_ghcr='${{ steps.build_ghcr.outputs.digest }}'
          d_dh='${{ steps.build_dh.outputs.digest }}'
          touch "/tmp/digests/ghcr/${d_ghcr#sha256:}"
          touch "/tmp/digests/dh/${d_dh#sha256:}"

      # Main-path digest export: GHCR_MAIN_IMAGE + DH_MAIN_IMAGE.
      - name: Export digest (main)
        if: needs.plan.outputs.is_main == 'true'
        run: |
          mkdir -p /tmp/digests/ghcr-main /tmp/digests/dh-main
          d_ghcr_main='${{ steps.build_ghcr_main.outputs.digest }}'
          d_dh_main='${{ steps.build_dh_main.outputs.digest }}'
          touch "/tmp/digests/ghcr-main/${d_ghcr_main#sha256:}"
          touch "/tmp/digests/dh-main/${d_dh_main#sha256:}"

      - name: Upload GHCR digest
        if: needs.plan.outputs.is_tag == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: digests-ghcr-${{ matrix.variant }}-${{ matrix.arch }}
          path: /tmp/digests/ghcr/*
          if-no-files-found: error
          retention-days: 1

      - name: Upload Docker Hub digest
        if: needs.plan.outputs.is_tag == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: digests-dh-${{ matrix.variant }}-${{ matrix.arch }}
          path: /tmp/digests/dh/*
          if-no-files-found: error
          retention-days: 1

      - name: Upload GHCR main digest
        if: needs.plan.outputs.is_main == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: digests-ghcr-main-${{ matrix.variant }}-${{ matrix.arch }}
          path: /tmp/digests/ghcr-main/*
          if-no-files-found: error
          retention-days: 1

      - name: Upload Docker Hub main digest
        if: needs.plan.outputs.is_main == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: digests-dh-main-${{ matrix.variant }}-${{ matrix.arch }}
          path: /tmp/digests/dh-main/*
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # merge
  #
  # Per-variant: assemble the multi-arch manifest from the per-arch digests
  # uploaded by `build`, apply the human-readable tags, and then sign the
  # resulting manifest-list digest with cosign keyless (OIDC). Only ever
  # runs on tag pushes (`if: push == 'true'`) — main pushes skip this job
  # entirely. The single-arch `rocm` variant still goes through here —
  # `imagetools create` happily wraps a single platform under the same
  # tag scheme so consumers can pull `rocm` without caring about arch.
  # ---------------------------------------------------------------------------
  merge:
    needs: [plan, build]
    if: needs.plan.outputs.is_tag == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJSON(needs.plan.outputs.variants) }}
    permissions:
      contents: read
      packages: write
      id-token: write   # cosign keyless signing exchanges this OIDC token for a Fulcio cert
    steps:
      # `merge-multiple: true` extracts every matching artifact's
      # contents flat into `path/`, regardless of how many artifacts
      # match. Without it, download-artifact@v8 has an asymmetry that
      # bit us once already: with 2+ matches it creates per-artifact
      # subdirectories (path/<artifact_name>/<file>), but with exactly
      # 1 match it silently extracts straight into path/ (no subdir,
      # see actions/download-artifact src/download-artifact.ts: the
      # `artifacts.length === 1` branch). The single-arch rocm variant
      # has only one matching artifact, so the merge step then found
      # nothing under the expected subdir and called `imagetools
      # create` with an empty source ref. Flattening everything makes
      # the layout uniform across variants — collisions can't happen
      # because each artifact's only file is named with its unique
      # image digest.
      - name: Download GHCR digests for this variant
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: /tmp/digests/ghcr
          pattern: digests-ghcr-${{ matrix.variant }}-*
          merge-multiple: true

      - name: Download Docker Hub digests for this variant
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: /tmp/digests/dh
          pattern: digests-dh-${{ matrix.variant }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Per-variant title + description for the OCI annotations the
      # next step generates. The description ends up on the GHCR /
      # Docker Hub package pages (each registry reads
      # `org.opencontainers.image.description` from the INDEX manifest
      # — see DOCKER_METADATA_ANNOTATIONS_LEVELS below). Keep these
      # blurbs in sync with DockerHub.md and the "Available Images"
      # table there; if you add or rename a variant, update both.
      - name: Compute per-variant annotation overrides
        id: variant_meta
        env:
          VARIANT: ${{ matrix.variant }}
        run: |
          set -euo pipefail
          case "$VARIANT" in
            cpu)
              DESC="Kronk — Local LLM inference and audio transcription server (OpenAI-compatible API). CPU-only build, runs anywhere (no GPU required)."
              ;;
            cuda)
              DESC="Kronk — Local LLM inference and audio transcription server (OpenAI-compatible API). NVIDIA CUDA build (requires --gpus all and nvidia-container-toolkit)."
              ;;
            vulkan)
              DESC="Kronk — Local LLM inference and audio transcription server (OpenAI-compatible API). Vulkan build for AMD / Intel / NVIDIA GPUs (vendor-neutral)."
              ;;
            rocm)
              DESC="Kronk — Local LLM inference and audio transcription server (OpenAI-compatible API). AMD ROCm build (linux/amd64 only)."
              ;;
            all)
              DESC="Kronk — Local LLM inference and audio transcription server (OpenAI-compatible API). All backends bundled (cpu, cuda, vulkan, rocm); selects the right one at runtime based on host hardware."
              ;;
            *)
              echo "::error::No description configured for variant '$VARIANT' — add a case branch in .github/workflows/docker.yml" >&2
              exit 1
              ;;
          esac
          {
            echo "title=kronk ($VARIANT)"
            echo "description=$DESC"
          } >>"$GITHUB_OUTPUT"

      # Generate the canonical OCI annotation set (title, description,
      # source, url, revision, created, version, licenses, vendor) from
      # the workflow context, with per-variant title/description
      # overrides applied above.
      #
      # DOCKER_METADATA_ANNOTATIONS_LEVELS=index is the critical bit:
      # GHCR (and Docker Hub) read the description from annotations on
      # the INDEX manifest, not on the per-platform manifests beneath
      # it. The default is `manifest`, which silently does nothing for
      # multi-arch images — that's why the GHCR UI was warning that no
      # description was set despite per-arch labels being present.
      #
      # We don't use the `tags` output here (tag set is computed
      # downstream in the merge step), but `images:` is required by the
      # action so we pass both registries.
      - name: Generate OCI annotations
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DH_IMAGE }}
          annotations: |
            org.opencontainers.image.title=${{ steps.variant_meta.outputs.title }}
            org.opencontainers.image.description=${{ steps.variant_meta.outputs.description }}
            org.opencontainers.image.vendor=Ardan Labs

      - name: Create and push manifests
        id: merge_manifests
        env:
          VERSION: ${{ needs.plan.outputs.version }}
          VARIANT: ${{ matrix.variant }}
          IS_TAG: ${{ needs.plan.outputs.is_tag }}
          # Multi-line string of `index:<key>=<value>` entries produced
          # by docker/metadata-action above. Parsed into --annotation
          # flags for each `imagetools create` call below.
          ANNOTATIONS_INPUT: ${{ steps.meta.outputs.annotations }}
        run: |
          set -euo pipefail

          # -------------------------------------------------------------------
          # Translate metadata-action's `annotations` output into the
          # repeated --annotation flags that `buildx imagetools create`
          # expects. Each input line is already in the form
          # `index:org.opencontainers.image.<key>=<value>` (because of
          # DOCKER_METADATA_ANNOTATIONS_LEVELS=index on the meta step).
          # -------------------------------------------------------------------
          ANNOTATION_FLAGS=()
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            ANNOTATION_FLAGS+=(--annotation "$line")
          done <<<"$ANNOTATIONS_INPUT"

          echo "::group::Annotations"
          printf '  %s\n' "${ANNOTATION_FLAGS[@]}"
          echo "::endgroup::"

          # Build per-registry lists of per-arch digest references.
          # Layout (flattened by `merge-multiple: true` on the download
          # steps above):
          #   /tmp/digests/ghcr/<hexdigest>   (one file per arch)
          #   /tmp/digests/dh/<hexdigest>     (one file per arch)
          collect_refs() {
            local dir="$1" image="$2"
            local f d
            for f in "$dir"/*; do
              [[ -f "$f" ]] || continue
              d=$(basename "$f")
              printf '%s@sha256:%s\n' "$image" "$d"
            done
          }

          mapfile -t GHCR_REFS < <(collect_refs /tmp/digests/ghcr "$GHCR_IMAGE")
          mapfile -t DH_REFS   < <(collect_refs /tmp/digests/dh   "$DH_IMAGE")

          if (( ${#GHCR_REFS[@]} == 0 || ${#DH_REFS[@]} == 0 )); then
            echo "::error::No digests found for variant=${VARIANT} (ghcr=${#GHCR_REFS[@]}, dh=${#DH_REFS[@]})"
            ls -laR /tmp/digests || true
            exit 1
          fi

          # Determine the tag set for this variant. This job only
          # runs on tag pushes, so IS_TAG is always true here today —
          # the `if [[ "$IS_TAG" == "true" ]]` guard is kept defensive
          # in case a future event type also publishes images.
          #   tag push → <version>-<variant>     (e.g. v1.26.4-cpu)
          #            + latest-<variant>
          #            + latest (cpu only — see issue/PR discussion)
          TAGS=("${VERSION}-${VARIANT}")
          if [[ "$IS_TAG" == "true" ]]; then
            TAGS+=("latest-${VARIANT}")
            if [[ "$VARIANT" == "cpu" ]]; then
              TAGS+=("latest")
            fi
          fi

          echo "::group::Manifest plan"
          echo "variant=${VARIANT}"
          echo "tags=${TAGS[*]}"
          printf '  GHCR ref: %s\n' "${GHCR_REFS[@]}"
          printf '  DH   ref: %s\n' "${DH_REFS[@]}"
          echo "::endgroup::"

          # Capture the manifest-list digest from the FIRST imagetools
          # create per registry via --metadata-file. All subsequent
          # tags for this variant point at the same manifest-list
          # blob (extra `-t` flags just add tag refs), so one capture
          # per registry is enough.
          #
          # We use --metadata-file rather than inspecting a tag back
          # because it returns the digest of the artifact we just
          # wrote — no read-after-write race with the registry, and
          # no dependency on quirks like docker/buildx#1175.
          GHCR_META=$(mktemp)
          DH_META=$(mktemp)
          first=1
          for TAG in "${TAGS[@]}"; do
            GHCR_EXTRA=()
            DH_EXTRA=()
            if (( first )); then
              GHCR_EXTRA=(--metadata-file "$GHCR_META")
              DH_EXTRA=(--metadata-file "$DH_META")
              first=0
            fi

            echo ">>> ${GHCR_IMAGE}:${TAG}"
            docker buildx imagetools create \
              "${ANNOTATION_FLAGS[@]}" \
              "${GHCR_EXTRA[@]}" \
              -t "${GHCR_IMAGE}:${TAG}" "${GHCR_REFS[@]}"

            echo ">>> ${DH_IMAGE}:${TAG}"
            docker buildx imagetools create \
              "${ANNOTATION_FLAGS[@]}" \
              "${DH_EXTRA[@]}" \
              -t "${DH_IMAGE}:${TAG}" "${DH_REFS[@]}"
          done

          # Sign by digest, not tag. Why:
          #
          #   * silences the cosign "uses a tag, not a digest" warning
          #     (cosign plans to remove tag-based signing entirely);
          #   * collapses N signatures of the same content into one —
          #     a tag-release produces <version>-<variant> +
          #     latest-<variant> + (cpu only) latest, all pointing at
          #     the same digest, so we'd otherwise spend 2–3× the
          #     Rekor / Fulcio round-trips per variant.
          #
          # Consumers still verify by tag — cosign resolves the tag
          # to a digest and looks up signatures attached to that
          # digest, regardless of how the signature was produced.
          GHCR_DIGEST=$(jq -r '."containerimage.descriptor".digest // empty' "$GHCR_META")
          DH_DIGEST=$(jq -r '."containerimage.descriptor".digest // empty' "$DH_META")

          # Belt-and-braces. A malformed metadata file would otherwise
          # produce `<image>@` (empty digest) and a cryptic cosign
          # error a few steps later — fail fast here instead.
          [[ "$GHCR_DIGEST" == sha256:* ]] || {
            echo "::error::Failed to capture GHCR digest from $GHCR_META"
            cat "$GHCR_META" || true
            exit 1
          }
          [[ "$DH_DIGEST" == sha256:* ]] || {
            echo "::error::Failed to capture Docker Hub digest from $DH_META"
            cat "$DH_META" || true
            exit 1
          }

          SIGN_REFS=(
            "${GHCR_IMAGE}@${GHCR_DIGEST}"
            "${DH_IMAGE}@${DH_DIGEST}"
          )

          # Newline-separated for the GITHUB_OUTPUT multiline syntax.
          {
            echo 'sign_refs<<EOF'
            printf '%s\n' "${SIGN_REFS[@]}"
            echo 'EOF'
          } >>"$GITHUB_OUTPUT"

      # Install cosign for keyless signing. Pinned to the v3 commit SHA
      # so a malicious tag rewrite upstream can't substitute a hostile
      # binary into a signing-capable workflow.
      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      # Keyless sign each (registry, digest) we just published.
      # cosign exchanges the workflow's OIDC token (id-token: write
      # granted on this job) for a short-lived Fulcio cert tied to
      # the workflow identity, signs the manifest list at that
      # digest (and recursively each per-arch child manifest, via
      # --recursive), and records the signature plus a Rekor
      # transparency-log entry. Signing by digest rather than by
      # tag is what lets us collapse N tags-of-the-same-content
      # into one signature — see the merge step above.
      #
      # GHCR signatures are stored alongside the image (default cosign
      # behaviour). Docker Hub signatures are redirected to a sibling
      # repo (ardanlabs/kronk-signatures) via COSIGN_REPOSITORY so they
      # don't clutter the kronk tag list with sha256-*.sig entries.
      # That repo must exist and be public for keyless verification.
      #
      # IF YOU CHANGE THE SIGNING LAYOUT (e.g. rename the signatures
      # repo, switch to OCI 1.1 referrers, add another registry),
      # update these too:
      #   - DockerHub.md  ("Verifying Image Signatures" section, then
      #     paste into the Docker Hub repo description)
      #   - .manual/chapter-19-developer-guide.md  ("Merge + sign"
      #     section under the Docker workflow notes)
      #
      # Consumers verify with:
      #
      #   # GHCR (signatures co-located):
      #   cosign verify ghcr.io/ardanlabs/kronk:<tag> \
      #     --certificate-identity-regexp \
      #       'https://github.com/ardanlabs/kronk/.github/workflows/docker.yml@.*' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      #
      #   # Docker Hub (signatures in sibling repo):
      #   COSIGN_REPOSITORY=ardanlabs/kronk-signatures \
      #     cosign verify ardanlabs/kronk:<tag> \
      #       --certificate-identity-regexp \
      #         'https://github.com/ardanlabs/kronk/.github/workflows/docker.yml@.*' \
      #       --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Sign published manifests (cosign keyless)
        env:
          SIGN_REFS: ${{ steps.merge_manifests.outputs.sign_refs }}
          DH_IMAGE: ${{ env.DH_IMAGE }}
          DH_SIG_REPO: ardanlabs/kronk-signatures
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          while IFS= read -r ref; do
            [[ -z "$ref" ]] && continue
            # Redirect Docker Hub signatures to the sibling -signatures
            # repo so they don't show up as sha256-*.sig tags on the
            # main image repo. GHCR refs are signed with the default
            # (co-located) behaviour. Refs are in digest form
            # (<image>@sha256:...) — see the merge step above.
            if [[ "$ref" == "${DH_IMAGE}@"* ]]; then
              echo ">>> cosign sign $ref (COSIGN_REPOSITORY=${DH_SIG_REPO})"
              COSIGN_REPOSITORY="${DH_SIG_REPO}" cosign sign --recursive "$ref"
            else
              echo ">>> cosign sign $ref"
              cosign sign --recursive "$ref"
            fi
          done <<<"$SIGN_REFS"

      - name: Inspect published images
        env:
          VERSION: ${{ needs.plan.outputs.version }}
          VARIANT: ${{ matrix.variant }}
        run: |
          docker buildx imagetools inspect "${GHCR_IMAGE}:${VERSION}-${VARIANT}" || true
          docker buildx imagetools inspect "${DH_IMAGE}:${VERSION}-${VARIANT}" || true

  # ---------------------------------------------------------------------------
  # merge_main
  #
  # The main-branch counterpart to `merge`. Runs only on push → main
  # (`if: is_main == 'true'`). Assembles the multi-arch manifest for each
  # variant from the per-arch digests uploaded by `build`, applies the
  # trunk-snapshot tags to BOTH snapshot repos (GHCR_MAIN_IMAGE +
  # DH_MAIN_IMAGE), and cosign-signs each manifest-list digest — full
  # supply-chain parity with the release path, on both registries.
  #
  #   push → main → <GHCR_MAIN_IMAGE>:main-<sha>-<variant>   (immutable)
  #               + <GHCR_MAIN_IMAGE>:main-latest-<variant>  (floating)
  #               + <DH_MAIN_IMAGE>:main-<sha>-<variant>     (immutable)
  #               + <DH_MAIN_IMAGE>:main-latest-<variant>    (floating)
  #
  # No floating `latest` / `main` alias — main-latest-<variant> is the
  # only moving pointer, so a consumer must always name a variant.
  #
  # ONE-TIME SETUP: the first run creates the GHCR_MAIN_IMAGE package
  # (GHCR makes it private and unlinked to the repo by default — a
  # maintainer must set it public on the package settings page) and the
  # DH_MAIN_IMAGE + kronk-main-signatures repos on Docker Hub (create
  # them public before the first run, or verification fails). Only then
  # can external consumers pull/verify main-latest-*.
  # Retention of the immutable main-<sha> snapshots is handled by
  # cache-cleanup.yml (see its prune-*-main jobs).
  # ---------------------------------------------------------------------------
  merge_main:
    needs: [plan, build]
    if: needs.plan.outputs.is_main == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJSON(needs.plan.outputs.variants) }}
    permissions:
      contents: read
      packages: write
      id-token: write   # cosign keyless signing exchanges this OIDC token for a Fulcio cert
    steps:
      # `merge-multiple: true` flattens every matching artifact's file
      # straight into `path/`. Required for the single-arch rocm variant
      # (one matching artifact) — see the long note on the release
      # `merge` job's download step for the download-artifact@v8
      # single-vs-multi asymmetry this avoids.
      - name: Download GHCR main digests for this variant
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: /tmp/digests/ghcr-main
          pattern: digests-ghcr-main-${{ matrix.variant }}-*
          merge-multiple: true

      - name: Download Docker Hub main digests for this variant
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: /tmp/digests/dh-main
          pattern: digests-dh-main-${{ matrix.variant }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Per-variant title + description for the OCI index annotations
      # GHCR renders on the package page. Kept in sync with the release
      # `merge` job's variant_meta step; the main images carry the same
      # blurbs with a trunk-snapshot note appended.
      - name: Compute per-variant annotation overrides
        id: variant_meta
        env:
          VARIANT: ${{ matrix.variant }}
        run: |
          set -euo pipefail
          case "$VARIANT" in
            cpu)
              DESC="Kronk (main-branch snapshot) — Local LLM inference and audio transcription server (OpenAI-compatible API). CPU-only build, runs anywhere (no GPU required)."
              ;;
            cuda)
              DESC="Kronk (main-branch snapshot) — Local LLM inference and audio transcription server (OpenAI-compatible API). NVIDIA CUDA build (requires --gpus all and nvidia-container-toolkit)."
              ;;
            vulkan)
              DESC="Kronk (main-branch snapshot) — Local LLM inference and audio transcription server (OpenAI-compatible API). Vulkan build for AMD / Intel / NVIDIA GPUs (vendor-neutral)."
              ;;
            rocm)
              DESC="Kronk (main-branch snapshot) — Local LLM inference and audio transcription server (OpenAI-compatible API). AMD ROCm build (linux/amd64 only)."
              ;;
            all)
              DESC="Kronk (main-branch snapshot) — Local LLM inference and audio transcription server (OpenAI-compatible API). All backends bundled (cpu, cuda, vulkan, rocm); selects the right one at runtime based on host hardware."
              ;;
            *)
              echo "::error::No description configured for variant '$VARIANT' — add a case branch in .github/workflows/docker.yml" >&2
              exit 1
              ;;
          esac
          {
            echo "title=kronk-main ($VARIANT)"
            echo "description=$DESC"
          } >>"$GITHUB_OUTPUT"

      - name: Generate OCI annotations
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index
        with:
          images: |
            ${{ env.GHCR_MAIN_IMAGE }}
            ${{ env.DH_MAIN_IMAGE }}
          annotations: |
            org.opencontainers.image.title=${{ steps.variant_meta.outputs.title }}
            org.opencontainers.image.description=${{ steps.variant_meta.outputs.description }}
            org.opencontainers.image.vendor=Ardan Labs

      - name: Create and push manifests
        id: merge_manifests
        env:
          VERSION: ${{ needs.plan.outputs.version }}
          VARIANT: ${{ matrix.variant }}
          ANNOTATIONS_INPUT: ${{ steps.meta.outputs.annotations }}
        run: |
          set -euo pipefail

          # metadata-action emits `index:<key>=<value>` lines (because of
          # DOCKER_METADATA_ANNOTATIONS_LEVELS=index) — turn each into a
          # repeated --annotation flag for `imagetools create`.
          ANNOTATION_FLAGS=()
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            ANNOTATION_FLAGS+=(--annotation "$line")
          done <<<"$ANNOTATIONS_INPUT"

          echo "::group::Annotations"
          printf '  %s\n' "${ANNOTATION_FLAGS[@]}"
          echo "::endgroup::"

          # Per-registry per-arch digest refs for this variant (flattened
          # layout from merge-multiple: true above):
          #   /tmp/digests/ghcr-main/<hexdigest>
          #   /tmp/digests/dh-main/<hexdigest>
          collect_refs() {
            local dir="$1" image="$2"
            local f d
            for f in "$dir"/*; do
              [[ -f "$f" ]] || continue
              d=$(basename "$f")
              printf '%s@sha256:%s\n' "$image" "$d"
            done
          }

          mapfile -t GHCR_REFS < <(collect_refs /tmp/digests/ghcr-main "$GHCR_MAIN_IMAGE")
          mapfile -t DH_REFS   < <(collect_refs /tmp/digests/dh-main   "$DH_MAIN_IMAGE")

          if (( ${#GHCR_REFS[@]} == 0 || ${#DH_REFS[@]} == 0 )); then
            echo "::error::No digests found for variant=${VARIANT} (ghcr=${#GHCR_REFS[@]}, dh=${#DH_REFS[@]})"
            ls -laR /tmp/digests || true
            exit 1
          fi

          # Trunk-snapshot tag set: immutable per-commit + floating.
          #   main-<sha>-<variant>  (VERSION is already "main-<sha>")
          #   main-latest-<variant>
          TAGS=("${VERSION}-${VARIANT}" "main-latest-${VARIANT}")

          echo "::group::Manifest plan"
          echo "variant=${VARIANT}"
          echo "tags=${TAGS[*]}"
          printf '  GHCR ref: %s\n' "${GHCR_REFS[@]}"
          printf '  DH   ref: %s\n' "${DH_REFS[@]}"
          echo "::endgroup::"

          # Capture each registry's manifest-list digest from the FIRST
          # imagetools create via --metadata-file. Both tags on a registry
          # point at the same manifest-list blob, so one capture per
          # registry is enough to sign once.
          GHCR_META=$(mktemp)
          DH_META=$(mktemp)
          first=1
          for TAG in "${TAGS[@]}"; do
            GHCR_EXTRA=()
            DH_EXTRA=()
            if (( first )); then
              GHCR_EXTRA=(--metadata-file "$GHCR_META")
              DH_EXTRA=(--metadata-file "$DH_META")
              first=0
            fi

            echo ">>> ${GHCR_MAIN_IMAGE}:${TAG}"
            docker buildx imagetools create \
              "${ANNOTATION_FLAGS[@]}" \
              "${GHCR_EXTRA[@]}" \
              -t "${GHCR_MAIN_IMAGE}:${TAG}" "${GHCR_REFS[@]}"

            echo ">>> ${DH_MAIN_IMAGE}:${TAG}"
            docker buildx imagetools create \
              "${ANNOTATION_FLAGS[@]}" \
              "${DH_EXTRA[@]}" \
              -t "${DH_MAIN_IMAGE}:${TAG}" "${DH_REFS[@]}"
          done

          GHCR_DIGEST=$(jq -r '."containerimage.descriptor".digest // empty' "$GHCR_META")
          DH_DIGEST=$(jq -r '."containerimage.descriptor".digest // empty' "$DH_META")
          [[ "$GHCR_DIGEST" == sha256:* ]] || {
            echo "::error::Failed to capture GHCR main digest from $GHCR_META"
            cat "$GHCR_META" || true
            exit 1
          }
          [[ "$DH_DIGEST" == sha256:* ]] || {
            echo "::error::Failed to capture Docker Hub main digest from $DH_META"
            cat "$DH_META" || true
            exit 1
          }

          SIGN_REFS=(
            "${GHCR_MAIN_IMAGE}@${GHCR_DIGEST}"
            "${DH_MAIN_IMAGE}@${DH_DIGEST}"
          )
          {
            echo 'sign_refs<<EOF'
            printf '%s\n' "${SIGN_REFS[@]}"
            echo 'EOF'
          } >>"$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      # Keyless-sign each registry's manifest-list digest (and each
      # per-arch child via --recursive). GHCR signatures are co-located
      # with the image (default cosign layout); Docker Hub signatures are
      # redirected to a sibling repo (ardanlabs/kronk-main-signatures) via
      # COSIGN_REPOSITORY so they don't clutter the kronk-main tag list —
      # exactly as the release path does for kronk-signatures. That repo
      # must exist and be public for keyless verification. Consumers
      # verify by tag:
      #
      #   # GHCR (signatures co-located):
      #   cosign verify ghcr.io/ardanlabs/kronk-main:main-latest-cpu \
      #     --certificate-identity-regexp \
      #       'https://github.com/ardanlabs/kronk/.github/workflows/docker.yml@.*' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      #
      #   # Docker Hub (signatures in sibling repo):
      #   COSIGN_REPOSITORY=ardanlabs/kronk-main-signatures \
      #     cosign verify ardanlabs/kronk-main:main-latest-cpu \
      #       --certificate-identity-regexp \
      #         'https://github.com/ardanlabs/kronk/.github/workflows/docker.yml@.*' \
      #       --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Sign published manifests (cosign keyless)
        env:
          SIGN_REFS: ${{ steps.merge_manifests.outputs.sign_refs }}
          DH_MAIN_IMAGE: ${{ env.DH_MAIN_IMAGE }}
          DH_MAIN_SIG_REPO: ardanlabs/kronk-main-signatures
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          while IFS= read -r ref; do
            [[ -z "$ref" ]] && continue
            if [[ "$ref" == "${DH_MAIN_IMAGE}@"* ]]; then
              echo ">>> cosign sign $ref (COSIGN_REPOSITORY=${DH_MAIN_SIG_REPO})"
              COSIGN_REPOSITORY="${DH_MAIN_SIG_REPO}" cosign sign --recursive "$ref"
            else
              echo ">>> cosign sign $ref"
              cosign sign --recursive "$ref"
            fi
          done <<<"$SIGN_REFS"

      - name: Inspect published images
        env:
          VERSION: ${{ needs.plan.outputs.version }}
          VARIANT: ${{ matrix.variant }}
        run: |
          docker buildx imagetools inspect "${GHCR_MAIN_IMAGE}:${VERSION}-${VARIANT}" || true
          docker buildx imagetools inspect "${GHCR_MAIN_IMAGE}:main-latest-${VARIANT}" || true
          docker buildx imagetools inspect "${DH_MAIN_IMAGE}:${VERSION}-${VARIANT}" || true
          docker buildx imagetools inspect "${DH_MAIN_IMAGE}:main-latest-${VARIANT}" || true
