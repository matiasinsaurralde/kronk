version: 2

project_name: kronk

builds:
  - id: kronk
    main: ./cmd/kronk
    binary: kronk
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

before:
  hooks:
    - make kronk-docs
# FIXME: tsc fails on this
#    - make bui-build

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

brews:
  - name: kronk
    ids:
      - kronk
    repository:
      owner: ardanlabs
      name: homebrew-kronk
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/ardanlabs/kronk"
    description: "Local LLM inference SDK and server CLI"
    license: "Apache-2.0"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "kronk {{ .Tag }}"
    test: |
      system "#{bin}/kronk", "--version"
